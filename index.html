<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Frann Playlist Viewer</title>
  <style>
    :root {
      --player-width: 45%;
      --player-height: 65vh;
    }
    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      padding: 15px;
      gap: 12px;
    }

    /* 再生履歴 */
    #sidebar {
      width: 0; overflow: hidden; background: white; border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: width 0.4s ease;
      height: fit-content; align-self: flex-start;
    }
    #sidebar.open { width: 340px; padding: 15px; }

    #toggleHistoryBtn {
      position: fixed; left: 15px; top: 25px;
      width: 32px; height: 32px;
      background: #333; color: white;
      border: none; border-radius: 50%; font-size: 18px;
      cursor: pointer; z-index: 300;
    }

    /* メイン */
    #main {
      flex: 1;
      display: flex;
      gap: 10px;
      width: 100%;
    }

    /* プレイヤー */
    #player-area {
      width: var(--player-width);
      height: var(--player-height);
      flex-shrink: 0;
      position: relative;
      min-width: 320px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: none; }

    #player-horizontal-handle {
      position: absolute; top: 0; right: -4px; width: 9px; height: 100%;
      cursor: col-resize; z-index: 220;
    }
    #vertical-resize-bar {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 8px;
      background: #ddd; cursor: row-resize; z-index: 230;
    }
    #vertical-resize-bar:hover, #vertical-resize-bar.active { background: #ff0000; }

    #resize-bar {
      width: 6px; background: #ddd; cursor: col-resize;
      z-index: 100;
    }
    #resize-bar:hover, #resize-bar.active { background: #ff0000; }

    /* サムネイルエリア - 右端まで最大化 */
    #thumbnail-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
      padding-right: 0; /* 右端まで詰める */
    }
    h2 { 
      margin: 0 0 10px 0; 
      text-align: center; 
      font-size: 24px; 
    }
    #videos-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 0 4px 20px 4px; /* 右側も最小限に */
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4列固定 */
      gap: 14px;
      padding: 0 6px 0 2px; /* 右端まで詰める */
      width: 100%;
    }

    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .video-item:hover { transform: translateY(-4px); }
    .thumbnail { position: relative; }
    .thumbnail img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    .play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 54px; height: 54px;
      background: rgba(0,0,0,0.8);
      color: white;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 28px;
    }
    .active { outline: 4px solid #ff0000; outline-offset: -4px; }

    /* 右下ボタン */
    .fixed-buttons {
      position: fixed;
      right: 25px;
      bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }
    .fixed-btn {
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(0,0,0,0.35);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }
  </style>
</head>
<body>
  <button id="toggleHistoryBtn">›</button>

  <div id="sidebar">
    <div id="sidebar-header">
      <h3>再生履歴</h3>
      <button id="clearHistoryBtn">全削除</button>
    </div>
    <div id="history"></div>
  </div>

  <div id="main">
    <div id="player-area">
      <div id="player"></div>
      <div id="player-horizontal-handle"></div>
      <div id="vertical-resize-bar"></div>
    </div>

    <div id="resize-bar"></div>

    <div id="thumbnail-area">
      <h2>Frann Playlist Viewer</h2>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">全動画を読み込み中...</div>
      </div>
    </div>
  </div>

  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ サムネイル一番上に戻る</button>
  </div>

<script>
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const playlistId = "PLExT6MVBKs2CzmEcSCpaSQP_u7XONu6kD";

  const sidebar = document.getElementById("sidebar");
  const toggleHistoryBtn = document.getElementById("toggleHistoryBtn");
  const clearHistoryBtn = document.getElementById("clearHistoryBtn");
  const historyBox = document.getElementById("history");
  const playerArea = document.getElementById("player-area");
  const player = document.getElementById("player");
  const resizeBar = document.getElementById("resize-bar");
  const playerHorizontalHandle = document.getElementById("player-horizontal-handle");
  const verticalResizeBar = document.getElementById("vertical-resize-bar");
  const videosContainer = document.getElementById("videos");
  const videosWrapper = document.getElementById("videos-wrapper");
  const loadingEl = document.getElementById("loading");

  let currentActive = null;
  let currentVideoEl = null;
  let isHistoryOpen = false;

  function loadHistory() { return JSON.parse(localStorage.getItem("frann_history") || "[]"); }
  function saveHistory(video) {
    let history = loadHistory();
    history = history.filter(item => item.id !== video.id);
    history.unshift(video);
    history = history.slice(0, 30);
    localStorage.setItem("frann_history", JSON.stringify(history));
    renderHistory();
  }
  function renderHistory() {
    const history = loadHistory();
    historyBox.innerHTML = history.length === 0
      ? '<p style="color:#888; text-align:center; padding:30px 10px;">履歴はありません</p>'
      : "";
    history.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = item.title;
      div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior:"smooth", block:"center"});
      historyBox.appendChild(div);
    });
  }
  function clearHistory() {
    if (confirm("再生履歴をすべて削除しますか？")) {
      localStorage.removeItem("frann_history");
      renderHistory();
    }
  }
  function toggleHistory() {
    isHistoryOpen = !isHistoryOpen;
    sidebar.classList.toggle("open", isHistoryOpen);
    toggleHistoryBtn.textContent = isHistoryOpen ? "‹" : "›";
  }

  function playVideo(videoId, title, videoItemElement) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    if (currentActive) currentActive.classList.remove("active");
    videoItemElement.classList.add("active");
    currentActive = videoItemElement;
    currentVideoEl = videoItemElement;
    saveHistory({ id: videoId, title });
  }

  async function fetchAllVideos() {
    let items = [], pageToken = "";
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.items) items = items.concat(data.items);
      pageToken = data.nextPageToken;
    } while (pageToken);
    return items;
  }

  function renderAllVideos(items) {
    videosContainer.innerHTML = "";
    items.forEach(item => {
      const title = item.snippet.title;
      const videoId = item.snippet.resourceId?.videoId;
      if (!videoId) return;
      const thumbnail = item.snippet.thumbnails?.medium?.url || "";
      const div = document.createElement("div");
      div.className = "video-item";
      div.dataset.id = videoId;
      div.innerHTML = `
        <div class="thumbnail">
          <img src="${thumbnail}" loading="lazy">
          <div class="play-btn">▶</div>
        </div>
        <p>${title}</p>
      `;
      div.querySelector('.play-btn').onclick = (e) => {
        e.stopPropagation();
        playVideo(videoId, title, div);
      };
      videosContainer.appendChild(div);
    });
    loadingEl.style.display = "none";
  }

  function initResize() {
    let isH = false, isV = false;

    const start = () => { isH = true; document.body.style.cursor = "col-resize"; };
    resizeBar.addEventListener("mousedown", start);
    playerHorizontalHandle.addEventListener("mousedown", start);

    verticalResizeBar.addEventListener("mousedown", () => { isV = true; document.body.style.cursor = "row-resize"; });

    document.addEventListener("mousemove", (e) => {
      if (isH) {
        const rect = document.getElementById("main").getBoundingClientRect();
        let w = ((e.clientX - rect.left) / rect.width) * 100;
        w = Math.max(25, Math.min(70, w));
        document.documentElement.style.setProperty("--player-width", w + "%");
      }
      if (isV) {
        const rect = playerArea.getBoundingClientRect();
        let h = Math.max(280, Math.min(window.innerHeight * 0.95, e.clientY - rect.top));
        document.documentElement.style.setProperty("--player-height", (h / window.innerHeight * 100) + "vh");
      }
    });

    document.addEventListener("mouseup", () => {
      isH = isV = false;
      document.body.style.cursor = "default";
    });
  }

  async function main() {
    const items = await fetchAllVideos();
    renderAllVideos(items);
    renderHistory();
  }

  toggleHistoryBtn.addEventListener("click", toggleHistory);
  clearHistoryBtn.addEventListener("click", clearHistory);
  initResize();
  main();
</script>
</body>
</html>
