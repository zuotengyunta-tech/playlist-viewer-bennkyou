<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Frann Playlist Viewer - 高速版</title>
  <style>
    :root {
      --player-width: 45%;
      --player-height: 65vh;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f8f8f8;
    }
    body {
      display: flex;
      padding: 15px;
      gap: 15px;
      overflow: hidden;
    }

    #sidebar {
      width: 0; overflow: hidden; background: white; border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: width 0.4s ease;
      height: fit-content; align-self: flex-start;
    }
    #sidebar.open { width: 340px; padding: 15px; }

    #main {
      flex: 1; display: flex; gap: 15px; max-width: 1400px; width: 100%; height: 100vh;
    }
    #player-area {
      width: var(--player-width); height: var(--player-height);
      flex-shrink: 0; position: relative; background: white;
      border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); overflow: hidden;
      min-width: 320px;
    }
    #player { width: 100%; height: 100%; }

    #resize-bar, #player-horizontal-handle {
      cursor: col-resize; background: #ddd; transition: background 0.2s;
    }
    #resize-bar:hover, #resize-bar.active,
    #player-horizontal-handle:hover { background: #ff0000; }

    #vertical-resize-bar {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 8px;
      background: #ddd; cursor: row-resize; z-index: 230;
    }
    #vertical-resize-bar:hover, #vertical-resize-bar.active { background: #ff0000; }

    #thumbnail-area {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    #videos-wrapper {
      flex: 1; overflow-y: auto; padding-right: 8px; overscroll-behavior: contain;
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
      padding: 4px;
    }
    .video-item {
      background: white; border-radius: 12px; overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1); transition: all 0.2s;
    }
    .video-item:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    .thumbnail { position: relative; cursor: pointer; }
    .thumbnail img {
      width: 100%; aspect-ratio: 16 / 9; object-fit: cover; display: block;
    }
    .play-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 56px; height: 56px; background: rgba(0,0,0,0.75);
      color: white; border-radius: 50%; display: grid; place-items: center;
      font-size: 28px; transition: all 0.2s;
    }
    .play-btn:hover { background: #ff0000; transform: translate(-50%, -50%) scale(1.1); }
    .active { outline: 4px solid #ff0000; outline-offset: -4px; }

    .fixed-buttons {
      position: fixed; right: 40px; bottom: 35px; display: flex;
      flex-direction: column; gap: 12px; z-index: 100;
    }
    .fixed-btn {
      padding: 13px 24px; border: none; border-radius: 999px;
      color: #fff; font-weight: bold; cursor: pointer;
      box-shadow: 0 5px 18px rgba(0,0,0,0.35);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }
  </style>
</head>
<body>
  <button id="toggleHistoryBtn">›</button>
  
  <div id="sidebar">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>再生履歴</h3>
      <button id="clearHistoryBtn">全削除</button>
    </div>
    <div id="history"></div>
  </div>

  <div id="main">
    <div id="player-area">
      <div id="player"></div>
      <div id="player-horizontal-handle"></div>
      <div id="vertical-resize-bar"></div>
    </div>
    <div id="resize-bar"></div>
    
    <div id="thumbnail-area">
      <h2 style="margin:0 0 15px 0;text-align:center">Frann Playlist Viewer</h2>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading" style="text-align:center;padding:40px;color:#666">読み込み中...</div>
      </div>
    </div>
  </div>

  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ 一番上へ</button>
  </div>

<script>
// ==================== 設定 ====================
const API_KEY = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
const PLAYLIST_ID = "PLExT6MVBKs2CzmEcSCpaSQP_u7XONu6kD";

// ==================== DOM ====================
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleHistoryBtn");
const clearBtn = document.getElementById("clearHistoryBtn");
const historyBox = document.getElementById("history");
const playerArea = document.getElementById("player-area");
const player = document.getElementById("player");
const resizeBar = document.getElementById("resize-bar");
const playerHHandle = document.getElementById("player-horizontal-handle");
const vResizeBar = document.getElementById("vertical-resize-bar");
const videosContainer = document.getElementById("videos");
const loadingEl = document.getElementById("loading");
const jumpBtn = document.getElementById("jumpBtn");
const topBtn = document.getElementById("topBtn");

let allVideos = [];
let currentActive = null;
let currentVideoEl = null;

// ==================== 履歴 ====================
const loadHistory = () => JSON.parse(localStorage.getItem("frann_history") || "[]");
const saveHistory = (video) => {
  let h = loadHistory().filter(v => v.id !== video.id);
  h.unshift(video);
  localStorage.setItem("frann_history", JSON.stringify(h.slice(0, 30)));
  renderHistory();
};

const renderHistory = () => {
  const history = loadHistory();
  historyBox.innerHTML = history.length === 0 
    ? '<p style="color:#888;text-align:center;padding:40px 10px">履歴はありません</p>'
    : '';
  
  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.textContent = item.title;
    div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior:"smooth", block:"center"});
    historyBox.appendChild(div);
  });
};

// ==================== 動画再生 ====================
const playVideo = (videoId, title, el) => {
  player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  
  if (currentActive) currentActive.classList.remove("active");
  el.classList.add("active");
  currentActive = el;
  currentVideoEl = el;
  saveHistory({id: videoId, title});
};

// ==================== 高速API取得 ====================
async function fetchAllVideos() {
  let items = [];
  let pageToken = "";
  const requests = [];

  do {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${PLAYLIST_ID}&key=${API_KEY}&pageToken=${pageToken}`;
    requests.push(fetch(url).then(r => r.json()));
    // 次のページトークンは最初のレスポンスで取得
    if (requests.length === 1) {
      const data = await requests[0];
      pageToken = data.nextPageToken || "";
      items = items.concat(data.items || []);
    }
  } while (pageToken);

  // 残りの並列取得
  const results = await Promise.all(requests.slice(1));
  results.forEach(data => {
    if (data.items) items = items.concat(data.items);
  });

  return items;
}

// ==================== 超高速レンダリング ====================
function renderVideos(items) {
  videosContainer.innerHTML = "";
  const fragment = document.createDocumentFragment();

  items.forEach(item => {
    const title = item.snippet.title;
    const videoId = item.snippet.resourceId?.videoId;
    if (!videoId) return;

    const thumb = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url;

    const div = document.createElement("div");
    div.className = "video-item";
    div.dataset.id = videoId;
    div.innerHTML = `
      <div class="thumbnail">
        <img src="${thumb}" loading="lazy" decoding="async">
        <div class="play-btn">▶</div>
      </div>
      <p style="margin:8px 10px;font-size:14px;line-height:1.4">${title}</p>
    `;

    div.querySelector('.play-btn').addEventListener("click", e => {
      e.stopImmediatePropagation();
      playVideo(videoId, title, div);
    });

    fragment.appendChild(div);
  });

  videosContainer.appendChild(fragment);
  loadingEl.style.display = "none";
}

// ==================== リサイズ（軽量化） ====================
function initResize() {
  let isH = false, isV = false;

  const start = (e, vertical) => {
    if (vertical) isV = true;
    else isH = true;
    document.body.style.cursor = vertical ? "row-resize" : "col-resize";
    e.preventDefault();
  };

  resizeBar.addEventListener("mousedown", e => start(e, false));
  playerHHandle.addEventListener("mousedown", e => start(e, false));
  vResizeBar.addEventListener("mousedown", e => start(e, true));

  document.addEventListener("mousemove", e => {
    if (isH) {
      const rect = document.getElementById("main").getBoundingClientRect();
      let percent = ((e.clientX - rect.left) / rect.width) * 100;
      percent = Math.max(25, Math.min(70, percent));
      document.documentElement.style.setProperty("--player-width", percent + "%");
    }
    if (isV) {
      const rect = playerArea.getBoundingClientRect();
      let h = Math.max(280, Math.min(window.innerHeight * 0.95, e.clientY - rect.top));
      const vh = (h / window.innerHeight) * 100;
      document.documentElement.style.setProperty("--player-height", vh + "vh");
    }
  });

  document.addEventListener("mouseup", () => {
    isH = isV = false;
    document.body.style.cursor = "default";
  });
}

// ==================== メイン ====================
async function main() {
  loadingEl.textContent = "全動画を高速取得中...";
  try {
    allVideos = await fetchAllVideos();
    renderVideos(allVideos);
    renderHistory();
  } catch (e) {
    loadingEl.innerHTML = `<span style="color:red">エラー: ${e.message}</span>`;
  }
}

// 初期化
toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  toggleBtn.textContent = sidebar.classList.contains("open") ? "‹" : "›";
});
clearBtn.addEventListener("click", () => {
  if (confirm("履歴をすべて削除しますか？")) {
    localStorage.removeItem("frann_history");
    renderHistory();
  }
});

jumpBtn.onclick = () => currentVideoEl?.scrollIntoView({behavior:"smooth", block:"center"});
topBtn.onclick = () => document.getElementById("videos-wrapper").scrollTo({top:0, behavior:"smooth"});

initResize();
main();
</script>
</body>
</html>
