<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Frann Playlist Viewer</title>
  <style>
    :root {
      --player-width: 45%; /* 初期のプレイヤー幅（左側） */
    }
    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      padding: 15px;
      gap: 15px;
    }

    /* 左側：プレイヤーエリア */
    #player-area {
      width: var(--player-width);
      flex-shrink: 0;
      align-self: flex-start;
      transition: width 0.1s linear;
      position: relative;
      min-width: 300px;
      max-width: 70%;
    }

    /* 中央：リサイズバー */
    #resize-bar {
      width: 6px;
      background: #ddd;
      cursor: col-resize;
      border-radius: 3px;
      margin: 0 -3px;
      z-index: 100;
      transition: background 0.2s;
    }
    #resize-bar:hover, #resize-bar.active {
      background: #ff0000;
    }

    /* 右側：サムネイルエリア */
    #thumbnail-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
    }

    /* プレイヤー */
    #player {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
    }
    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
    }

    /* その他スタイル（ほぼ変更なし） */
    #sidebar {
      width: 0; overflow: hidden; background: white; border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: width 0.4s ease;
      height: fit-content; align-self: flex-start;
    }
    #sidebar.open { width: 340px; padding: 15px; }

    #toggleHistoryBtn {
      position: fixed; left: 15px; top: 25px;
      width: 32px; height: 32px;
      background: #333; color: white;
      border: none; border-radius: 50%; font-size: 18px;
      cursor: pointer; z-index: 200;
    }

    h2 { margin: 0 0 15px 0; text-align: center; font-size: 25px; }
    #videos-wrapper {
      flex: 1;
      overflow-y: auto;
      padding-right: 12px;
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .video-item:hover { transform: translateY(-4px); }
    .thumbnail { position: relative; }
    .thumbnail img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    .play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
      background: rgba(0,0,0,0.78);
      color: white;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 32px;
    }
    .play-btn:hover { background: #ff0000; }
    .active { outline: 4px solid #ff0000; outline-offset: -4px; }

    .fixed-buttons {
      position: fixed;
      right: 40px;
      bottom: 35px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }
    .fixed-btn {
      padding: 13px 24px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(0,0,0,0.35);
    }
    #jumpBtn { background: #ff0000; }
    #topBtn { background: #333; }
  </style>
</head>
<body>
  <!-- 再生履歴トグル -->
  <button id="toggleHistoryBtn">›</button>

  <!-- 再生履歴 -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h3>再生履歴</h3>
      <button id="clearHistoryBtn">全削除</button>
    </div>
    <div id="history"></div>
  </div>

  <!-- メインエリア -->
  <div id="main" style="display:flex; flex:1; gap:15px; max-width:1400px; width:100%;">
    
    <!-- 左：プレイヤー -->
    <div id="player-area">
      <div id="player"></div>
    </div>

    <!-- リサイズバー -->
    <div id="resize-bar"></div>

    <!-- 右：サムネイル一覧 -->
    <div id="thumbnail-area">
      <h2>Frann Playlist Viewer</h2>
      <div id="videos-wrapper">
        <div id="videos"></div>
        <div id="loading">全動画を読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 右下ボタン -->
  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ サムネイル一番上に戻る</button>
  </div>

<script>
  // === 設定 ===
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const playlistId = "PLExT6MVBKs2CzmEcSCpaSQP_u7XONu6kD";

  // === DOM ===
  const playerArea = document.getElementById("player-area");
  const resizeBar = document.getElementById("resize-bar");
  const thumbnailArea = document.getElementById("thumbnail-area");
  const player = document.getElementById("player");
  const videosContainer = document.getElementById("videos");
  const loadingEl = document.getElementById("loading");

  let currentActive = null;
  let currentVideoEl = null;

  // === リサイズ機能 ===
  let isResizing = false;

  function initResize() {
    resizeBar.addEventListener("mousedown", (e) => {
      isResizing = true;
      resizeBar.classList.add("active");
      document.body.style.cursor = "col-resize";
      e.preventDefault();
    });

    document.addEventListener("mousemove", (e) => {
      if (!isResizing) return;

      const mainRect = document.getElementById("main").getBoundingClientRect();
      let newPlayerWidth = ((e.clientX - mainRect.left) / mainRect.width) * 100;

      // 制限
      newPlayerWidth = Math.max(25, Math.min(70, newPlayerWidth));

      document.documentElement.style.setProperty("--player-width", newPlayerWidth + "%");
    });

    document.addEventListener("mouseup", () => {
      if (isResizing) {
        isResizing = false;
        resizeBar.classList.remove("active");
        document.body.style.cursor = "default";
      }
    });
  }

  // === 動画再生 ===
  function playVideo(videoId, title, videoItemElement) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    
    if (currentActive) currentActive.classList.remove("active");
    videoItemElement.classList.add("active");
    currentActive = videoItemElement;
    currentVideoEl = videoItemElement;
  }

  // === YouTube APIでプレイリスト取得 ===
  async function fetchAllVideos() {
    let items = [];
    let pageToken = "";
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.items) items = items.concat(data.items);
      pageToken = data.nextPageToken;
    } while (pageToken);
    return items;
  }

  function renderAllVideos(items) {
    videosContainer.innerHTML = "";
    items.forEach(item => {
      const title = item.snippet.title;
      const videoId = item.snippet.resourceId?.videoId;
      if (!videoId) return;
      const thumbnail = item.snippet.thumbnails?.medium?.url || "";

      const div = document.createElement("div");
      div.className = "video-item";
      div.dataset.id = videoId;
      div.innerHTML = `
        <div class="thumbnail">
          <img src="${thumbnail}" loading="lazy">
          <div class="play-btn">▶</div>
        </div>
        <p>${title}</p>
      `;
      div.querySelector('.play-btn').onclick = (e) => {
        e.stopPropagation();
        playVideo(videoId, title, div);
      };
      videosContainer.appendChild(div);
    });
    loadingEl.style.display = "none";
  }

  // メイン処理
  async function main() {
    try {
      const allItems = await fetchAllVideos();
      renderAllVideos(allItems);
    } catch (err) {
      loadingEl.innerHTML = `<p style="color:red;">エラー: ${err.message}</p>`;
    }
  }

  // 初期化
  initResize();
  main();
</script>
</body>
</html>
