<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Frann Playlist Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }

    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .video-item {
      cursor: pointer;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 8px;
      transition: transform 0.1s;
    }

    .video-item:hover { transform: scale(1.02); }

    .video-item img {
      width: 100%;
      border-radius: 6px;
      loading: lazy;
    }

    .active {
      outline: 3px solid red;
    }

    iframe {
      width: 100%;
      max-width: 560px;
      height: 315px;
      margin-top: 20px;
    }

    /* 右固定ボタン */
    #jumpBtn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #ff0000;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    #jumpBtn:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

<h2>Frann 再生リストビューアー</h2>

<div id="player"></div>
<button id="jumpBtn">再生中へ</button>

<div id="videos">読み込み中...</div>

<script>
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";

  // ★ 差し替え済み
  const playlistId = "PLExT6MVBKs2CzmEcSCpaSQP_u7XONu6kD";

  const container = document.getElementById("videos");
  const player = document.getElementById("player");
  const jumpBtn = document.getElementById("jumpBtn");

  let currentActive = null;

  async function fetchAllVideos(pageToken = "", allItems = []) {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error?.message || "API fetch error");

    if (data.items) allItems = allItems.concat(data.items);
    if (data.nextPageToken) return fetchAllVideos(data.nextPageToken, allItems);
    return allItems;
  }

  function renderVideos(items) {
    container.innerHTML = "";

    const fragment = document.createDocumentFragment();

    items.forEach(item => {
      const title = item.snippet.title;
      const videoId = item.snippet.resourceId?.videoId || "";
      if (!videoId) return;

      const thumbnail =
        item.snippet.thumbnails?.medium?.url ||
        item.snippet.thumbnails?.default?.url ||
        "";

      const div = document.createElement("div");
      div.className = "video-item";

      div.innerHTML = `
        <img src="${thumbnail}" alt="${title}" loading="lazy"/>
        <p>${title}</p>
      `;

      div.onclick = () => {
        player.innerHTML = `
          <iframe
            src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&autoplay=1"
            allow="autoplay; encrypted-media"
            allowfullscreen
          ></iframe>
        `;

        // アクティブ更新
        if (currentActive) currentActive.classList.remove("active");
        div.classList.add("active");
        currentActive = div;

        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      fragment.appendChild(div);
    });

    container.appendChild(fragment);
  }

  // 再生中へスクロール
  jumpBtn.onclick = () => {
    if (currentActive) {
      currentActive.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  };

  fetchAllVideos()
    .then(items => {
      renderVideos(items);
    })
    .catch(err => {
      container.innerText = "APIエラー: " + err.message;
      console.error(err);
    });
</script>

</body>
</html>
