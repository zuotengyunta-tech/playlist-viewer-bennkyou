<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Frann Playlist Viewer</title>

<style>
:root {
  --player-width: 40%;
}

body {
  margin: 0;
  font-family: Arial;
  display: flex;
  gap: 15px;
  padding: 15px;
  background: #f5f5f5;
}

/* 左：プレイヤー＋履歴 */
#player-area {
  width: var(--player-width);
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* プレイヤー */
#player-box {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  position: relative;
}

#player iframe {
  width: 100%;
  aspect-ratio: 16/9;
  border: none;
}

/* 拡大ボタン */
#expandBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  cursor: pointer;
}

/* フルスクリーン状態 */
.fullscreen {
  position: fixed !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 9999;
  border-radius: 0;
}
.fullscreen iframe {
  height: 100vh;
}

/* 履歴 */
#history-box {
  background: white;
  border-radius: 12px;
  padding: 10px;
  max-height: 300px;
  overflow-y: auto;
}

.history-item {
  padding: 8px;
  cursor: pointer;
}
.history-item:hover {
  background: #eee;
}

/* 右：動画一覧 */
#videos-area {
  flex: 1;
}

#videos {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 15px;
}

.video-item {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.thumbnail {
  position: relative;
}
.thumbnail img {
  width: 100%;
}

.play-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 30px;
  color: white;
}

.active {
  outline: 3px solid red;
}
</style>
</head>

<body>

<!-- 左 -->
<div id="player-area">

  <div id="player-box">
    <button id="expandBtn">拡大</button>
    <div id="player"></div>
  </div>

  <!-- 履歴を下へ -->
  <div id="history-box">
    <h3>再生履歴</h3>
    <div id="history"></div>
  </div>

</div>

<!-- 右 -->
<div id="videos-area">
  <h2>Frann Playlist Viewer</h2>
  <div id="videos"></div>
</div>

<script>
const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
const playlistId = "PLExT6MVBKs2CzmEcSCpaSQP_u7XONu6kD";

let currentActive = null;
const player = document.getElementById("player");
const historyBox = document.getElementById("history");

/* 履歴 */
function loadHistory(){
  return JSON.parse(localStorage.getItem("history")||"[]");
}
function saveHistory(v){
  let h = loadHistory().filter(x=>x.id!==v.id);
  h.unshift(v);
  h = h.slice(0,30);
  localStorage.setItem("history",JSON.stringify(h));
  renderHistory();
}
function renderHistory(){
  const h = loadHistory();
  historyBox.innerHTML="";
  h.forEach(v=>{
    const d=document.createElement("div");
    d.className="history-item";
    d.textContent=v.title;
    d.onclick=()=>playVideo(v.id,v.title);
    historyBox.appendChild(d);
  });
}

/* 動画再生 */
function playVideo(id,title,el){
  player.innerHTML =
    `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"></iframe>`;

  if(currentActive) currentActive.classList.remove("active");
  if(el) el.classList.add("active");
  currentActive = el;

  saveHistory({id,title});
}

/* 拡大 */
const expandBtn = document.getElementById("expandBtn");
const playerBox = document.getElementById("player-box");

expandBtn.onclick = () => {
  playerBox.classList.toggle("fullscreen");
};

/* API */
async function fetchVideos(){
  let items=[],token="";
  do{
    const url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${token}`;
    const r=await fetch(url);
    const d=await r.json();
    if(d.items) items=items.concat(d.items);
    token=d.nextPageToken;
  }while(token);
  return items;
}

/* 描画 */
function render(vs){
  const box=document.getElementById("videos");
  vs.forEach(v=>{
    const id=v.snippet.resourceId.videoId;
    const title=v.snippet.title;
    const img=v.snippet.thumbnails.medium.url;

    const el=document.createElement("div");
    el.className="video-item";
    el.innerHTML=`
      <div class="thumbnail">
        <img src="${img}">
        <div class="play-btn">▶</div>
      </div>
      <p>${title}</p>
    `;

    el.onclick=()=>playVideo(id,title,el);
    box.appendChild(el);
  });
}

fetchVideos().then(v=>{
  render(v);
  renderHistory();
});
</script>

</body>
</html>
