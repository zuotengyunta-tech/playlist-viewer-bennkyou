<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Frann Playlist Viewer</title>
  <style>
    :root {
      --thumbnail-ratio: 55%;
    }

    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      padding: 15px;
      gap: 15px;
    }

    /* 左：履歴 */
    #sidebar {
      width: 0;
      overflow: hidden;
      background: white;
      border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: width 0.4s ease;
      height: fit-content;
    }
    #sidebar.open { width: 340px; padding: 15px; }

    #toggleHistoryBtn {
      position: fixed; left: 15px; top: 25px;
      width: 32px; height: 32px;
      background: #333; color: white;
      border: none; border-radius: 50%;
      font-size: 18px; cursor: pointer;
      z-index: 200;
    }

    /* メイン */
    #main {
      flex: 1;
      display: flex;
      gap: 15px;
      max-width: 1400px;
    }

    /* プレイヤー（左側） */
    #player-area {
      width: var(--thumbnail-ratio);
      flex-shrink: 0;
      transition: width 0.4s ease;
      position: relative;
    }
    #player-area.collapsed {
      width: 60px;
    }

    #player {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      display: none;
    }
    #player-area:not(.collapsed) #player {
      display: block;
    }

    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
    }

    /* ← ボタンを左に変更 */
    #togglePlayerBtn {
      position: absolute;
      top: 20px;
      left: -18px;
      width: 36px; height: 36px;
      background: #333;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      z-index: 210;
    }

    /* サムネ */
    #thumbnail-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-height: 100vh;
    }

    #videos-wrapper {
      flex: 1;
      overflow-y: auto;
      padding-right: 12px;
    }

    #videos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }

    .thumbnail {
      position: relative;
      cursor: pointer;
    }

    .thumbnail img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
      background: rgba(0,0,0,0.78);
      color: white;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 32px;
    }

    .video-item p {
      margin: 12px;
      font-size: 14.5px;
    }

    .active {
      outline: 4px solid #ff0000;
    }

    .fixed-buttons {
      position: fixed;
      right: 40px;
      bottom: 35px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fixed-btn {
      padding: 13px 24px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      background: #333;
    }
  </style>
</head>
<body>

<button id="toggleHistoryBtn">›</button>

<div id="sidebar"></div>

<div id="main">

  <!-- 左に移動 -->
  <div id="player-area">
    <button id="togglePlayerBtn">›</button>
    <div id="player"></div>
  </div>

  <!-- 右にサムネ -->
  <div id="thumbnail-area">
    <h2>Frann Playlist Viewer</h2>
    <div id="videos-wrapper">
      <div id="videos"></div>
    </div>
  </div>

</div>

<script>
const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
const playlistId = "PLExT6MVBKs2CzmEcSCpaSQP_u7XONu6kD";

let currentActive = null;

const videosContainer = document.getElementById("videos");
const player = document.getElementById("player");
const playerArea = document.getElementById("player-area");

document.getElementById("togglePlayerBtn").onclick = () => {
  playerArea.classList.toggle("collapsed");
};

async function fetchAllVideos() {
  let items = [];
  let pageToken = "";
  do {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.items) items = items.concat(data.items);
    pageToken = data.nextPageToken;
  } while (pageToken);
  return items;
}

function renderVideos(items) {
  items.forEach(item => {
    const videoId = item.snippet.resourceId.videoId;
    const title = item.snippet.title;
    const thumb = item.snippet.thumbnails.medium.url;

    const div = document.createElement("div");
    div.className = "video-item";
    div.innerHTML = `
      <div class="thumbnail">
        <img src="${thumb}">
        <div class="play-btn">▶</div>
      </div>
      <p>${title}</p>
    `;

    div.onclick = () => {
      player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1"></iframe>`;
      if (currentActive) currentActive.classList.remove("active");
      div.classList.add("active");
      currentActive = div;
    };

    videosContainer.appendChild(div);
  });
}

fetchAllVideos().then(renderVideos);
</script>

</body>
</html>
