<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Frann Playlist Viewer</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; scroll-behavior: smooth;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      display: flex;
      padding: 15px;
      gap: 15px;
    }

    /* 左側：再生履歴（スライド式・完全格納） */
    #sidebar {
      width: 0;
      overflow: hidden;
      background: white;
      border-radius: 12px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      transition: width 0.4s ease;
      height: fit-content;
      align-self: flex-start;
      padding: 0;
    }
    #sidebar.open {
      width: 340px;
      padding: 15px;
    }
    #sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    #sidebar h3 {
      margin: 0;
      font-size: 16px;
    }
    #clearHistoryBtn {
      font-size: 11px;
      padding: 4px 10px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .history-item {
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      line-height: 1.4;
    }
    .history-item:hover {
      background: #f5f5f5;
    }

    /* トグルボタン（左端に固定） */
    #toggleBtn {
      position: fixed;
      left: 15px;
      top: 25px;
      width: 32px;
      height: 32px;
      background: #333;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #toggleBtn:hover {
      background: #555;
    }

    /* 右側メインエリア */
    #main {
      flex: 1;
      display: flex;
      gap: 25px;
      max-width: 1250px;
    }

    /* サムネイルエリア（横3列・細長すぎないように調整） */
    #thumbnail-area {
      flex: 1;
    }
    h2 {
      margin: 0 0 20px 0;
      text-align: center;
      font-size: 25px;
    }
    #videos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .video-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: all 0.2s;
    }
    .video-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .thumbnail {
      position: relative;
      cursor: pointer;
    }
    .thumbnail img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    .play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 62px; height: 62px;
      background: rgba(0,0,0,0.78);
      color: white;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 34px;
    }
    .play-btn:hover {
      background: #ff0000;
      transform: translate(-50%, -50%) scale(1.1);
    }
    .video-item p {
      margin: 12px;
      font-size: 14.8px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 43px;
    }

    /* プレイヤーエリア */
    #player-area {
      width: 720px;
      flex-shrink: 0;
    }
    #player {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
    }
    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
    }

    #loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: #666;
    }

    /* 右下固定ボタン */
    .fixed-buttons {
      position: fixed;
      right: 40px;
      bottom: 35px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }
    .fixed-btn {
      padding: 13px 24px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 18px rgba(0,0,0,0.35);
    }
    .fixed-btn:hover { transform: scale(1.06); }
    #jumpBtn { background: #ff0000; }
    #topBtn  { background: #333; }
  </style>
</head>
<body>

  <!-- トグルボタン -->
  <button id="toggleBtn">›</button>

  <!-- 再生履歴（スライド） -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h3>再生履歴</h3>
      <button id="clearHistoryBtn">全削除</button>
    </div>
    <div id="history"></div>
  </div>

  <!-- メインエリア -->
  <div id="main">
    <div id="thumbnail-area">
      <h2>Frann Playlist Viewer</h2>
      <div id="videos"></div>
      <div id="loading">読み込み中...</div>
    </div>

    <div id="player-area">
      <div id="player"></div>
    </div>
  </div>

  <!-- 右下ボタン -->
  <div class="fixed-buttons">
    <button id="jumpBtn" class="fixed-btn">▶ 再生中へ戻る</button>
    <button id="topBtn" class="fixed-btn">↑ 一番上に戻る</button>
  </div>

<script>
  const apiKey = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const playlistId = "PLExT6MVBKs2CzmEcSCpaSQP_u7XONu6kD";

  let allItems = [];
  let currentIndex = 0;
  let currentActive = null;
  let currentVideoEl = null;
  let isLoading = false;
  let isSidebarOpen = false;

  const sidebar = document.getElementById("sidebar");
  const toggleBtn = document.getElementById("toggleBtn");
  const videosContainer = document.getElementById("videos");
  const loadingEl = document.getElementById("loading");
  const player = document.getElementById("player");
  const jumpBtn = document.getElementById("jumpBtn");
  const topBtn = document.getElementById("topBtn");
  const clearHistoryBtn = document.getElementById("clearHistoryBtn");
  const historyBox = document.getElementById("history");

  // 履歴機能
  function loadHistory() { return JSON.parse(localStorage.getItem("frann_history") || "[]"); }
  function saveHistory(video) {
    let history = loadHistory();
    history = history.filter(item => item.id !== video.id);
    history.unshift(video);
    history = history.slice(0, 30);
    localStorage.setItem("frann_history", JSON.stringify(history));
    renderHistory();
  }
  function renderHistory() {
    const history = loadHistory();
    historyBox.innerHTML = history.length === 0 
      ? '<p style="color:#888; text-align:center; padding:30px 10px;">履歴はありません</p>' 
      : "";
    history.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = item.title;
      div.onclick = () => document.querySelector(`[data-id="${item.id}"]`)?.scrollIntoView({behavior:"smooth", block:"center"});
      historyBox.appendChild(div);
    });
  }
  function clearHistory() {
    if (confirm("再生履歴をすべて削除しますか？")) {
      localStorage.removeItem("frann_history");
      renderHistory();
    }
  }

  // サイドバー開閉
  function toggleSidebar() {
    isSidebarOpen = !isSidebarOpen;
    if (isSidebarOpen) {
      sidebar.classList.add("open");
      toggleBtn.textContent = "‹";
      toggleBtn.style.left = "345px";
    } else {
      sidebar.classList.remove("open");
      toggleBtn.textContent = "›";
      toggleBtn.style.left = "15px";
    }
  }

  // YouTube動画読み込み
  async function fetchAllVideos() {
    let items = [];
    let pageToken = "";
    do {
      const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.items) items = items.concat(data.items);
      pageToken = data.nextPageToken;
    } while (pageToken);
    return items;
  }

  function renderMoreVideos(count = 12) {
    if (isLoading || currentIndex >= allItems.length) return;
    isLoading = true;
    loadingEl.style.display = "block";

    const fragment = document.createDocumentFragment();
    const end = Math.min(currentIndex + count, allItems.length);

    for (let i = currentIndex; i < end; i++) {
      const item = allItems[i];
      const title = item.snippet.title;
      const videoId = item.snippet.resourceId?.videoId;
      if (!videoId) continue;
      const thumbnail = item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || "";

      const div = document.createElement("div");
      div.className = "video-item";
      div.dataset.id = videoId;
      div.innerHTML = `
        <div class="thumbnail">
          <img src="${thumbnail}" loading="lazy">
          <div class="play-btn">▶</div>
        </div>
        <p>${title}</p>
      `;
      div.querySelector('.play-btn').onclick = (e) => {
        e.stopPropagation();
        playVideo(videoId, title, div);
      };
      fragment.appendChild(div);
    }
    videosContainer.appendChild(fragment);
    currentIndex = end;
    isLoading = false;
    if (currentIndex >= allItems.length) loadingEl.style.display = "none";
  }

  function playVideo(videoId, title, videoItemElement) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    if (currentActive) currentActive.classList.remove("active");
    videoItemElement.classList.add("active");
    currentActive = videoItemElement;
    currentVideoEl = videoItemElement;
    saveHistory({ id: videoId, title });
  }

  function handleScroll() {
    if (isLoading) return;
    if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 800) {
      renderMoreVideos(9);
    }
  }

  // ボタン
  jumpBtn.onclick = () => currentVideoEl?.scrollIntoView({behavior: "smooth", block: "center"});
  topBtn.onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });

  // メイン実行
  async function main() {
    try {
      allItems = await fetchAllVideos();
      renderHistory();
      renderMoreVideos(12);
      window.addEventListener("scroll", handleScroll);
    } catch (err) {
      videosContainer.innerHTML = `<p style="color:red; padding:20px;">エラー: ${err.message}</p>`;
    }
  }

  toggleBtn.addEventListener("click", toggleSidebar);
  clearHistoryBtn.addEventListener("click", clearHistory);
  main();
</script>
</body>
</html>
